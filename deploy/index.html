<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Korfu & Ksamil 2026 · Familie Monschein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;800&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<style>
/* ══════════════════════════════════════
   DESIGN SYSTEM — Custom Properties
══════════════════════════════════════ */
:root {
  --tiefsee:    #0d3b5e;
  --aegaeis:    #1a6b9a;
  --horizont:   #5ba3c9;
  --creme:      #f7f2eb;
  --warm-white: #fefcf8;
  --tinte:      #1a2332;
  --blaugrau:   #5a7a8a;
  --border:     #e8e0d5;
  --e1:         #1a6b9a;
  --e2:         #2a9d8f;
  --e3:         #5c7a3e;
  --tv:         #8a9aaa;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono:    'Space Mono', monospace;
  --font-body:    'Nunito', system-ui, sans-serif;
  --header-h:   52px;
  --nav-h:      calc(64px + env(safe-area-inset-bottom));
  --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--creme); }
body { font-family: var(--font-body); color: var(--tinte); }
img { display: block; max-width: 100%; }
button { cursor: pointer; border: none; background: none; font: inherit; }

/* ── App Shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Header ── */
#app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: transparent;
  pointer-events: none;
}
#app-header.solid {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  pointer-events: all;
}
.header-logo {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--tiefsee);
  pointer-events: all;
  letter-spacing: -0.01em;
}
.header-actions {
  display: flex;
  gap: 12px;
  pointer-events: all;
}
.header-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  color: var(--tiefsee);
  transition: background 0.2s;
}
.header-btn:hover { background: var(--warm-white); }
.header-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Day Viewport ── */
#day-viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  touch-action: pan-y;
}
.cards-track {
  display: flex;
  height: 100%;
  transition: transform 0.35s var(--ease-smooth);
  will-change: transform;
}
.day-card {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ── Position Dots ── */
#tab-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 0 4px;
  background: var(--warm-white);
}
.tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  border: 1.5px solid var(--blaugrau);
  background: transparent;
  transition: all 0.2s;
}
.tab-dot.active {
  background: var(--active-etappe, var(--tiefsee));
  border-color: var(--active-etappe, var(--tiefsee));
  transform: scale(1.3);
}

/* ── Bottom Navigation ── */
#bottom-nav {
  display: flex;
  background: var(--warm-white);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 4px 8px;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--blaugrau);
  border-top: 3px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  position: relative;
}
.nav-tab.active { color: var(--tab-color); border-top-color: var(--tab-color); }
.nav-tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-tab[data-tab="e1"] { --tab-color: var(--e1); }
.nav-tab[data-tab="e2"] { --tab-color: var(--e2); }
.nav-tab[data-tab="e3"] { --tab-color: var(--e3); }

/* ── Modals ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(13,59,94,0.4);
  backdrop-filter: blur(6px);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
}
.modal-backdrop.open { opacity: 1; }
.modal-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-height: 88vh;
  background: var(--warm-white);
  border-radius: 20px 20px 0 0;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.35s var(--ease-smooth);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-sheet.open { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 8px;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--tiefsee);
}
.modal-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--creme);
  color: var(--blaugrau);
}
.modal-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.modal-body { padding: 20px; }

/* ══════════════════════════════════════
   SPLASH
══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0;
  background: var(--tiefsee);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#splash.hidden {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.sp-family {
  width: min(80vw, 320px);
  opacity: 0;
  transform: translateY(24px);
  animation: spFadeUp 0.8s var(--ease-smooth) 0.3s forwards;
  mix-blend-mode: multiply;
  filter: brightness(1.05);
}
.sp-title {
  text-align: center;
  margin-top: 24px;
  opacity: 0;
  transform: translateY(16px);
  animation: spFadeUp 0.7s var(--ease-smooth) 0.9s forwards;
}
.sp-title h1 {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 5vw, 1.8rem);
  color: var(--warm-white);
  font-weight: 700;
}
.sp-title p {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--horizont);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 6px;
}
.sp-route {
  width: min(90vw, 380px);
  margin-top: 32px;
  opacity: 0;
  animation: spFadeUp 0.6s var(--ease-smooth) 1.8s forwards;
}
.sp-route svg { width: 100%; height: auto; overflow: visible; }
.route-path {
  stroke: var(--horizont);
  stroke-width: 1.5;
  fill: none;
  stroke-dasharray: 600;
  stroke-dashoffset: 600;
  animation: drawPath 1.4s var(--ease-smooth) 2.0s forwards;
}
.route-dot {
  fill: var(--horizont);
  opacity: 0;
  animation: dotAppear 0.3s ease forwards;
}
.route-label {
  font-family: var(--font-mono);
  font-size: 8px;
  fill: rgba(91,163,201,0.85);
  letter-spacing: 0.05em;
}
.sp-skip {
  position: absolute;
  top: 20px; right: 20px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  transition: color 0.2s, border-color 0.2s;
}
.sp-skip:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.4); }
@keyframes spFadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes drawPath {
  to { stroke-dashoffset: 0; }
}
@keyframes dotAppear {
  to { opacity: 1; }
}

/* ══════════════════════════════════════
   DAY CARD — PHOTO ZONE
══════════════════════════════════════ */
.card-photo-zone {
  position: relative;
  height: 58vh;
  min-height: 260px;
  overflow: hidden;
  flex-shrink: 0;
}
.card-photo {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 90%);
  mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 90%);
}
.card-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    135deg,
    rgba(13,59,94,0.35) 0%,
    transparent 60%
  );
  pointer-events: none;
}
.watercolor-edge {
  position: absolute;
  bottom: -1px; left: -5%; right: -5%;
  height: 100px;
  pointer-events: none;
}
.watercolor-edge svg { width: 110%; height: 100%; }

/* Gesperrte Karte (zukünftige Tage) */
.card-photo-zone.locked .card-photo {
  filter: blur(4px) brightness(0.7);
  -webkit-mask-image: none;
  mask-image: none;
}
.lock-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: rgba(255,255,255,0.9);
}
.lock-overlay svg { width: 36px; height: 36px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.lock-overlay span {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
}

/* Pre-Trip Countdown Overlay */
.countdown-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: clamp(20px,5vw,40px) clamp(20px,6vw,48px);
  background: linear-gradient(
    to top,
    rgba(13,59,94,0.85) 0%,
    rgba(13,59,94,0.4) 50%,
    transparent 100%
  );
}
.countdown-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--horizont);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.countdown-num {
  font-family: var(--font-display);
  font-size: clamp(5rem, 22vw, 9rem);
  font-weight: 900;
  line-height: 1;
  color: var(--warm-white);
}
.countdown-unit {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 4vw, 2rem);
  font-style: italic;
  color: rgba(255,255,255,0.8);
  margin-top: 4px;
}
.countdown-next {
  margin-top: 20px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: rgba(255,255,255,0.9);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   DAY CARD — CONTENT ZONE
══════════════════════════════════════ */
.card-content-zone {
  background: var(--warm-white);
  padding: 0 clamp(20px,6vw,36px);
  padding-bottom: 32px;
}
.card-meta {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--blaugrau);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding-top: 24px;
  margin-bottom: 6px;
}
.card-etappe-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
  position: relative; top: -1px;
}
.card-title {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 6vw, 2.4rem);
  font-weight: 900;
  color: var(--tiefsee);
  line-height: 1.15;
  margin-bottom: 6px;
}
.card-sub {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--blaugrau);
  font-weight: 400;
  margin-bottom: 28px;
  line-height: 1.5;
}
.card-avatar {
  width: 100%;
  max-width: 320px;
  margin: 0 auto 28px;
  display: block;
}
.card-avatar img {
  width: 100%;
  height: auto;
  mix-blend-mode: multiply;
  border-radius: 8px;
}

/* Highlights */
.card-highlights-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blaugrau);
  margin-bottom: 10px;
}
.card-highlights {
  border-top: 1px solid var(--border);
  margin-bottom: 12px;
}
.highlight-item {
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--tinte);
  display: flex;
  align-items: center;
  gap: 10px;
}
.highlight-item svg {
  width: 16px; height: 16px;
  stroke: var(--aegaeis); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  flex-shrink: 0;
}

/* Scroll Hint */
.scroll-hint {
  display: flex;
  justify-content: center;
  padding: 16px 0 8px;
  color: var(--border);
}
.scroll-hint svg {
  width: 22px; height: 22px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  animation: bounceDown 1.6s ease-in-out infinite;
}
@keyframes bounceDown {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(5px); }
}

/* Detail Sections */
.detail-section { margin-top: 32px; }
.detail-section-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blaugrau);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Activity List */
.act-list { display: flex; flex-direction: column; gap: 14px; }
.act-item { display: flex; flex-direction: column; gap: 2px; }
.act-title {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--tinte);
}
.act-desc {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--blaugrau);
  line-height: 1.45;
}

/* Selfie Spots */
.selfie-list { display: flex; flex-direction: column; gap: 14px; }
.selfie-item { background: var(--creme); border-radius: 10px; padding: 12px 14px; }
.selfie-title {
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--tiefsee);
  margin-bottom: 4px;
}
.selfie-tip {
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--blaugrau);
  line-height: 1.4;
}

/* Restaurants */
.rest-list { display: flex; flex-direction: column; gap: 16px; }
.rest-item { border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.rest-item:last-child { border-bottom: none; }
.rest-name {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--tinte);
  margin-bottom: 3px;
}
.rest-desc {
  font-family: var(--font-body);
  font-size: 0.8rem;
  color: var(--blaugrau);
  line-height: 1.4;
  margin-bottom: 7px;
}
.rest-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.rest-tag {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--blaugrau);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
}

/* Tips */
.tips-list { display: flex; flex-direction: column; gap: 10px; }
.tip-item {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: var(--blaugrau);
  line-height: 1.45;
  padding-left: 14px;
  position: relative;
}
.tip-item::before {
  content: '';
  position: absolute;
  left: 0; top: 8px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--aegaeis);
}

/* Evening */
.card-eve {
  font-family: var(--font-body);
  font-size: 0.88rem;
  color: var(--tinte);
  line-height: 1.55;
  font-style: italic;
  padding: 14px 16px;
  border-left: 3px solid var(--aegaeis);
  background: var(--creme);
  border-radius: 0 8px 8px 0;
}

/* Alerts */
.card-alert {
  margin-bottom: 20px;
  padding: 12px 16px;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 0.82rem;
  line-height: 1.45;
}
.card-alert.warn { background: #fff3cd; color: #664d03; }
.card-alert.info { background: #d3eaf9; color: #0c5176; }

/* Past day overlay */
.day-card.past .card-photo-zone::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(247,242,235,0.25);
  pointer-events: none;
}

/* Heute-Badge */
.day-card.today .card-photo-zone::before {
  content: 'HEUTE';
  position: absolute;
  top: calc(var(--header-h) + 12px);
  left: 16px;
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--warm-white);
  background: var(--aegaeis);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ══════════════════════════════════════
   MAP (Leaflet in Modal)
══════════════════════════════════════ */
#map-container {
  height: 55vh;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}

/* ══════════════════════════════════════
   ROUTE MODAL CONTENT
══════════════════════════════════════ */
.route-timeline { display: flex; flex-direction: column; gap: 0; }
.route-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.route-step:last-child { border-bottom: none; }
.route-step-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.route-step-text { flex: 1; }
.route-step-title {
  font-family: var(--font-body);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--tinte);
  margin-bottom: 2px;
}
.route-step-detail {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--blaugrau);
  letter-spacing: 0.06em;
}

/* ══════════════════════════════════════
   TODO MODAL CONTENT
══════════════════════════════════════ */
.todo-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.todo-progress-fill {
  height: 100%;
  background: var(--e2);
  border-radius: 2px;
  transition: width 0.4s var(--ease-smooth);
}
.todo-group { margin-bottom: 24px; }
.todo-group-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--blaugrau);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.todo-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--creme);
  cursor: pointer;
}
.todo-item:last-child { border-bottom: none; }
.todo-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

const TRIP_START = new Date('2026-07-18T00:00:00');
const TRIP_END   = new Date('2026-08-04T00:00:00'); // exklusiv (nach Tag 17)
const IS_PREVIEW = new URLSearchParams(window.location.search).has('preview');

function getPhase() {
  if (IS_PREVIEW) return 'preview';
  const now = new Date();
  if (now < TRIP_START) return 'pre';
  if (now >= TRIP_END)  return 'post';
  return 'trip';
}

// Gibt 0-basierten Tages-Index des aktuellen Reisetags zurück (-1 wenn kein Reisetag)
function getTodayIndex() {
  if (IS_PREVIEW) return -1;
  const now = new Date();
  const diff = Math.floor((now - TRIP_START) / (1000 * 60 * 60 * 24));
  if (diff < 0 || diff >= DAYS.length) return -1;
  return diff;
}

// Für einen DAYS-Eintrag: ist er vergangen / heute / zukünftig?
function getDayState(dayIndex) {
  if (IS_PREVIEW) return 'unlocked';
  const todayIdx = getTodayIndex();
  const phase = getPhase();
  if (phase === 'pre')  return 'locked';
  if (phase === 'post') return 'unlocked';
  // during trip:
  if (dayIndex < todayIdx)  return 'past';
  if (dayIndex === todayIdx) return 'today';
  return 'locked';
}

function renderCards() {
  const ids   = TAB_DAYS[activeTab];
  const track = document.getElementById('cards-track');
  if (!track) return;
  track.innerHTML = '';

  const phase = getPhase();

  ids.forEach((dayId, idx) => {
    const day    = DAYS.find(d => d.id === dayId);
    if (!day) return;
    const dayIdx = DAYS.indexOf(day);
    const state  = getDayState(dayIdx);

    // Foto-URL: erstes Foto aus day.photos, sonst Fallback per Etappe
    const fallbackKey = day.et === 'e2' ? 'ksamil'
                      : day.et === 'e3' ? 'korfuAerial'
                      : 'agiosGordios';
    const photoKey = (day.photos && day.photos[0]) || fallbackKey;
    const photoUrl = IMG[photoKey]
      ? IMG[photoKey].replace('width=600', 'width=800')
      : '';

    const etCol  = `var(--${day.et})`;
    const wcEdge = WC_EDGES[day.et] || WC_EDGES.tv;
    const avtFile = AVT_IMG[day.avt] || 'av-family-casual.png';

    // Countdown (nur erste Karte in e1 bei pre-Phase)
    const isCountdown = phase === 'pre' && idx === 0 && activeTab === 'e1';

    // Foto-Zone HTML
    let photoZoneHtml;
    if (state === 'locked') {
      photoZoneHtml = `
        <div class="card-photo-zone locked">
          <img class="card-photo" src="${photoUrl}" alt="${day.title}" loading="lazy">
          <div class="card-photo-overlay"></div>

          <img class="card-photo" src="${photoUrl}" alt="${day.title}" loading="eager">
          ${buildCountdownOverlay()}

// Task 7: Swipe-Navigation (Pointer Events API)
function initSwipe() {
  const viewport = document.getElementById('day-viewport');
  if (!viewport) return;
  let startX = 0, startY = 0, isDragging = false, isHorizontal = null, currentX = 0;

  viewport.addEventListener('pointerdown', e => {
    startX = e.clientX;
    startY = e.clientY;
    isDragging = true;
    isHorizontal = null;
    currentX = 0;
    viewport.setPointerCapture(e.pointerId);
  });

  viewport.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    if (isHorizontal === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    }
    if (!isHorizontal) return;

    e.preventDefault();
    currentX = dx;
    const track = document.getElementById('cards-track');
    if (track) {
      track.style.transition = 'none';
      track.style.transform = `translateX(calc(-${activeDayInTab * 100}% + ${dx}px))`;
    }
  });

  viewport.addEventListener('pointerup', () => {
    if (!isDragging || !isHorizontal) { isDragging = false; return; }
    isDragging = false;
    const threshold = (viewport.offsetWidth || 375) * 0.25;
    const count = TAB_DAYS[activeTab].length;

    if (currentX < -threshold && activeDayInTab < count - 1) {
      activeDayInTab++;
    } else if (currentX > threshold && activeDayInTab > 0) {
      activeDayInTab--;
    }
    currentX = 0;
    updateTrackPosition(true);
    renderDots();
  });

  viewport.addEventListener('pointercancel', () => {
    isDragging = false;
    currentX = 0;
    updateTrackPosition(true);
  });
}

// Task 9: Modal öffnen / schließen
function openModal(id) {
  const backdrop = document.getElementById(`modal-${id}-backdrop`);
  const sheet    = document.getElementById(`modal-${id}`);
  if (!backdrop || !sheet) return;
  backdrop.hidden = false;
  sheet.hidden    = false;
  requestAnimationFrame(() => {
    backdrop.classList.add('open');
    sheet.classList.add('open');
  });
  backdrop.addEventListener('click', () => closeModal(id), { once: true });
}

function closeModal(id) {
  const backdrop = document.getElementById(`modal-${id}-backdrop`);
  const sheet    = document.getElementById(`modal-${id}`);
  if (!backdrop || !sheet) return;
  backdrop.classList.remove('open');
  sheet.classList.remove('open');
  setTimeout(() => {
    backdrop.hidden = true;
    sheet.hidden    = true;
  }, 350);
}

  if (!content) return;

  const total = TODOS.reduce((s, g) => s + g.items.length, 0);
  const done  = Object.values(state).filter(Boolean).length;

  if (progress) progress.style.width = `${total > 0 ? Math.round(done / total * 100) : 0}%`;

  content.innerHTML = TODOS.map(group => `

      <div class="todo-group-label">${group.g}</div>
      ${group.items.map(item => `

    { title:'Etappe 1 · Agios Gordios',      detail:'19.–22. Juli · Poseidon Suites',        color:'var(--e1)' },
    { title:'Transfer → Ksamil',             detail:'22. Juli · Fähre Korfu → Saranda',      color:'var(--tv)' },
    { title:'Etappe 2 · Ksamil',             detail:'22.–29. Juli · Muze Hotel',             color:'var(--e2)' },
    { title:'Transfer → Ýpsos',              detail:'29. Juli · Fähre Saranda → Korfu',      color:'var(--tv)' },
    { title:'Etappe 3 · Ýpsos',              detail:'29. Juli–3. Aug · Hotel Yannis',         color:'var(--e3)' },
    { title:'Rückreise · Korfu → Graz',      detail:'3. August · OS862 10:50 Uhr',           color:'var(--tv)' },
  ];
  const timeline = document.getElementById('route-timeline');
  if (!timeline) return;
  timeline.innerHTML = steps.map(s => `
    <div class="route-step">
      <div class="route-step-dot" style="background:${s.color}"></div>
      <div class="route-step-text">
        <div class="route-step-title">${s.title}</div>
        <div class="route-step-detail">${s.detail}</div>
      </div>
    </div>`).join('');
}

// Task 10: Karte initialisieren (Leaflet) — lazy beim ersten Modal-Öffnen
function initMap() {
  // Karte erst beim ersten Öffnen des Route-Modals initialisieren
  document.getElementById('btn-route')?.addEventListener('click', () => {
    if (window._mapInstance) return;
    const container = document.getElementById('map-container');
    if (!container || typeof L === 'undefined') return;

    const map = L.map('map-container', { zoomControl: false }).setView([39.7, 19.9], 8);
    window._mapInstance = map;

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      subdomains: 'abcd',
      maxZoom: 18
    }).addTo(map);

    const colors = { e1:'#1a6b9a', e2:'#2a9d8f', e3:'#5c7a3e', tv:'#8a9aaa' };

    const hotels = [
      { name:'Poseidon Suites · Agios Gordios', lat:39.5558, lng:19.8695, et:'e1' },
      { name:'Muze Hotel · Ksamil',             lat:39.7703, lng:20.0027, et:'e2' },
      { name:'Hotel Yannis · Ýpsos',            lat:39.6850, lng:19.8735, et:'e3' },
    ];
    hotels.forEach(h => {
      const col = colors[h.et];
      L.circleMarker([h.lat, h.lng], {
        radius: 8, color: col, fillColor: col, fillOpacity: 0.9, weight: 2
      }).bindPopup(`<b>${h.name}</b>`).addTo(map);
    });

    const routePoints = [
      [39.5558, 19.8695],  // Agios Gordios
      [39.6230, 19.9168],  // Korfu Hafen
      [39.8756, 20.0053],  // Saranda
      [39.7703, 20.0027],  // Ksamil
      [39.8756, 20.0053],  // Saranda zurück
      [39.6230, 19.9168],  // Korfu Hafen
      [39.6850, 19.8735],  // Ýpsos
    ];
    L.polyline(routePoints, {
      color: '#8a9aaa', weight: 1.5, dashArray: '4,6', opacity: 0.6
    }).addTo(map);

    map.fitBounds(L.latLngBounds(routePoints), { padding: [30, 30] });
  }, { once: true });
}

/* ══════════════════════════════════════
   INIT — wird nach Splash aufgerufen
══════════════════════════════════════ */
function initApp() {
  if (IS_PREVIEW) {
    const banner = document.getElementById('preview-banner');
    if (banner) banner.hidden = false;
  }
  setInitialTab();
  renderCards();
  renderBottomNav();
  renderDots();
  initSplash();
  initModals();
  initMap();
  initSwipe();
  const track = document.getElementById('cards-track');
  if (track) track.addEventListener('scroll', updateHeaderBg, true);
}

function setInitialTab() {
  const phase = getPhase();
  const todayIdx = getTodayIndex();
  if (phase === 'pre' || phase === 'preview') { activeTab = 'e1'; activeDayInTab = 0; return; }
  if (phase === 'post') { activeTab = 'e1'; activeDayInTab = 0; return; }
  // trip: finde den heutigen Tag
  const todayId = DAYS[todayIdx]?.id;
  for (const [tab, ids] of Object.entries(TAB_DAYS)) {
    const idx = ids.indexOf(todayId);
    if (idx >= 0) { activeTab = tab; activeDayInTab = idx; return; }
  }
}

/* ══════════════════════════════════════
   SPLASH — Initialisierung
══════════════════════════════════════ */
function initSplash() {
  const seen = localStorage.getItem('korfu26_splash');
  const forceShow = new URLSearchParams(location.search).has('splash');
  if (seen && !forceShow) { endSplash(true); return; }

  // Routen-SVG in #sp-route einfügen
  const routeEl = document.getElementById('sp-route');
  if (routeEl) {
    routeEl.innerHTML = `
      <svg viewBox="0 0 380 120" xmlns="http://www.w3.org/2000/svg">
        <path class="route-path" d="M30,95 C55,85 70,40 110,35 C150,30 160,55 190,50 C215,46 220,75 250,70 C275,66 295,45 335,55 C355,60 365,80 350,95"/>
        <circle class="route-dot" cx="30"  cy="95" r="4" style="animation-delay:2.1s"/>
        <circle class="route-dot" cx="110" cy="35" r="4" style="animation-delay:2.5s"/>
        <circle class="route-dot" cx="190" cy="50" r="4" style="animation-delay:2.9s"/>
        <circle class="route-dot" cx="250" cy="70" r="4" style="animation-delay:3.1s"/>
        <circle class="route-dot" cx="335" cy="55" r="4" style="animation-delay:3.3s"/>
        <text class="route-label" x="18"  y="110" style="opacity:0;animation:dotAppear .3s 2.2s forwards">Graz</text>
        <text class="route-label" x="96"  y="28"  style="opacity:0;animation:dotAppear .3s 2.6s forwards">Korfu</text>
        <text class="route-label" x="178" y="42"  style="opacity:0;animation:dotAppear .3s 3.0s forwards">Ksamil</text>
        <text class="route-label" x="238" y="85"  style="opacity:0;animation:dotAppear .3s 3.2s forwards">Ypsos</text>
      </svg>`;
  }

  // Skip-Button
  const skipBtn = document.getElementById('sp-skip');
  if (skipBtn) skipBtn.addEventListener('click', () => endSplash());

  // Auto-Ende nach 4.5s
  setTimeout(endSplash, 4500);
}

function endSplash(instant = false) {
  localStorage.setItem('korfu26_splash', '1');
  const splash = document.getElementById('splash');
  const app    = document.getElementById('app');
  if (!splash || !app) return;
  if (instant) {
    splash.style.display = 'none';
    app.hidden = false;
    return;
  }
  splash.classList.add('hidden');
  app.hidden = false;
  setTimeout(() => { splash.style.display = 'none'; }, 700);
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
