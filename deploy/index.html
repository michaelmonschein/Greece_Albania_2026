<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌊 Korfu &amp; Ksamil 2026 — Familie Monschein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --sea:#1B6CA8;--sea2:#3A8DC4;--turq:#00B4B4;
  --olive:#5C7A3E;--terra:#C4622D;--sand:#F2E4C4;
  --lemon:#F5C518;--chalk:#FAFDF8;--dark:#1E2B3C;--muted:#6B7A8D;
  --r:12px;--sh:0 4px 24px rgba(27,108,168,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--chalk);color:var(--dark);overflow-x:hidden}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#083560 0%,#1B6CA8 40%,#00B4B4 75%,#2EC4A4 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
  transition:opacity .8s ease}
#splash.out{opacity:0;pointer-events:none}

.s-sun{position:absolute;top:36px;right:48px;width:72px;height:72px;
  background:var(--lemon);border-radius:50%;
  box-shadow:0 0 0 14px rgba(245,197,24,.18),0 0 0 28px rgba(245,197,24,.08);
  animation:sunP 3s ease-in-out infinite}
@keyframes sunP{50%{box-shadow:0 0 0 20px rgba(245,197,24,.28),0 0 0 40px rgba(245,197,24,.12)}}

.s-title{font-family:'Playfair Display',serif;color:#fff;text-align:center;z-index:10;
  margin-bottom:28px;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.s-title h1{font-size:clamp(1.8rem,5vw,3.2rem);font-weight:900;letter-spacing:-.5px}
.s-title p{font-family:'Nunito',sans-serif;font-size:clamp(.8rem,2vw,1.1rem);
  color:rgba(255,255,255,.8);margin-top:6px;letter-spacing:2px;text-transform:uppercase}

.avrow{display:flex;gap:clamp(12px,3vw,28px);z-index:10;margin-top:16px;flex-wrap:nowrap}
.avcard{display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;transform:translateY(28px)}
.avcard.show{animation:avIn .55s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes avIn{to{opacity:1;transform:translateY(0)}}
.avname{font-family:'Nunito',sans-serif;color:#fff;font-weight:800;
  font-size:.8rem;letter-spacing:1px;text-shadow:0 1px 8px rgba(0,0,0,.3)}

.s-waves{position:absolute;bottom:0;left:0;width:100%;height:90px;overflow:hidden}
.s-waves svg{width:200%;animation:waveM 6s linear infinite}
@keyframes waveM{to{transform:translateX(-50%)}}

#skip-btn{position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.18);color:#fff;
  border:1px solid rgba(255,255,255,.4);border-radius:20px;
  padding:5px 14px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;z-index:10001;backdrop-filter:blur(4px);transition:background .2s}
#skip-btn:hover{background:rgba(255,255,255,.32)}

/* ── APP ── */
#app{min-height:100vh;opacity:0;transition:opacity .5s ease}
#app.vis{opacity:1}

.app-hdr{background:linear-gradient(135deg,var(--sea) 0%,#0A3D6B 100%);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(27,108,168,.3)}
.app-hdr h1{font-family:'Playfair Display',serif;color:#fff;
  font-size:clamp(1rem,2.5vw,1.4rem);font-weight:700}
.app-hdr h1 span{color:var(--lemon)}
.hdr-btns{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,.15);color:#fff;
  border:1px solid rgba(255,255,255,.3);border-radius:8px;
  padding:7px 12px;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:800;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.hbtn:hover{background:rgba(255,255,255,.28);transform:translateY(-1px)}

/* ── TABS ── */
.tabs-wrap{background:#fff;border-bottom:2px solid var(--sand);
  position:sticky;top:49px;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.etappe-bar{display:flex;background:var(--sand);overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;padding:0 8px}
.etappe-bar::-webkit-scrollbar{display:none}
.etag{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.8px;
  padding:3px 10px;white-space:nowrap;color:var(--muted)}
.etag.e1{color:var(--sea)}.etag.e2{color:var(--terra)}.etag.e3{color:var(--olive)}

.tabs-scroll{overflow-x:auto;white-space:nowrap;scrollbar-width:none;
  -ms-overflow-style:none;touch-action:pan-x;-webkit-overflow-scrolling:touch}
.tabs-scroll::-webkit-scrollbar{display:none}
.tabs-inner{display:inline-flex;gap:3px;padding:5px 8px}
.tbtn{background:none;border:2px solid transparent;border-radius:8px;
  padding:5px 10px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;
  cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .18s}
.tbtn:hover{background:var(--sand)}
.tbtn.all.active{background:var(--dark);border-color:var(--dark);color:#fff}
.tbtn.e1.active{background:var(--sea);border-color:var(--sea);color:#fff}
.tbtn.e2.active{background:var(--terra);border-color:var(--terra);color:#fff}
.tbtn.e3.active{background:var(--olive);border-color:var(--olive);color:#fff}
.tbtn.tv.active{background:#4A5568;border-color:#4A5568;color:#fff}

/* ── LAYOUT ── */
.main-lay{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 100px)}
.map-panel{position:sticky;top:100px;height:calc(100vh - 100px)}
#map{width:100%;height:100%}
.content{padding:16px;overflow-y:auto;max-height:calc(100vh - 100px)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px}

/* ── DAY CARDS ── */
.dcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);
  margin-bottom:18px;overflow:hidden;
  opacity:0;transform:translateY(16px);transition:all .4s cubic-bezier(.34,1.2,.64,1)}
.dcard.vis{opacity:1;transform:translateY(0)}
.dcard-hdr{padding:14px 18px;display:flex;align-items:flex-start;gap:10px}
.dcard-hdr.e1{background:linear-gradient(135deg,var(--sea),var(--sea2))}
.dcard-hdr.e2{background:linear-gradient(135deg,var(--terra),#E07A50)}
.dcard-hdr.e3{background:linear-gradient(135deg,var(--olive),#7CA85A)}
.dcard-hdr.tv{background:linear-gradient(135deg,#4A5568,#718096)}
.dtag{background:rgba(255,255,255,.22);color:#fff;border-radius:6px;
  padding:3px 8px;font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;white-space:nowrap}
.dcard-hdr h2{color:#fff;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
.dcard-hdr p{color:rgba(255,255,255,.8);font-size:.76rem;margin-top:2px}
.dbody{padding:14px 18px}

/* activities */
.alist{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.aitem{display:flex;gap:8px;align-items:flex-start}
.aico{font-size:1rem;flex-shrink:0;margin-top:1px}
.atxt strong{display:block;font-size:.88rem;font-weight:700;color:var(--dark)}
.atxt span{font-size:.78rem;color:var(--muted)}

/* selfie spots */
.sbox{background:linear-gradient(135deg,#FFFBE6,#FFF5CC);border-radius:8px;
  padding:10px 13px;margin-bottom:12px;border-left:3px solid var(--lemon)}
.sbox h4{font-size:.74rem;font-weight:900;color:#7A6000;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px}
.sitem{font-size:.78rem;color:#5A4500;margin-bottom:3px}

/* evening */
.ebox{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-radius:8px;
  padding:10px 13px;border-left:3px solid var(--sea)}
.ebox h4{font-size:.74rem;font-weight:900;color:var(--sea);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:5px}
.ebox p{font-size:.8rem;color:var(--dark)}

/* photos */
.photos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.photo-wrap{border-radius:8px;overflow:hidden;aspect-ratio:4/3;background:var(--sand);position:relative}
.photo-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.photo-wrap:hover img{transform:scale(1.06)}
.photo-cap{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.55));
  color:#fff;font-size:.65rem;padding:8px 6px 4px;font-weight:700}

/* restaurant */
.rcard{background:linear-gradient(135deg,#FFF5EF,#FFF0E8);border-radius:8px;
  padding:10px 13px;margin-bottom:7px;border-left:3px solid var(--terra)}
.rcard h4{font-size:.88rem;font-weight:800;color:var(--terra)}
.rcard p{font-size:.78rem;color:var(--muted);margin-top:4px}
.rtags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.rtag{background:rgba(196,98,45,.12);color:var(--terra);border-radius:4px;
  padding:2px 6px;font-size:.68rem;font-weight:800}

/* tips */
.tips-box{background:#F0FFF4;border-radius:8px;padding:10px 13px;margin-top:12px;
  border-left:3px solid var(--olive)}
.tips-box h4{font-size:.74rem;font-weight:900;color:var(--olive);text-transform:uppercase;margin-bottom:6px}
.tip-item{font-size:.78rem;color:#2D5016;margin-bottom:3px;padding-left:12px;position:relative}
.tip-item::before{content:'→';position:absolute;left:0;color:var(--olive)}

/* alert boxes */
.alert-box{border-radius:8px;padding:10px 13px;margin-bottom:12px;font-size:.8rem}
.alert-box.warn{background:#FFF3E0;border-left:3px solid var(--terra);color:#5A3000}
.alert-box.info{background:#E8F4FF;border-left:3px solid var(--turq);color:#003A5A}
.alert-box strong{display:block;font-weight:800;margin-bottom:4px}

/* section label */
.slabel{font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--muted);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:var(--sand)}

/* weather box */
.weather-wrap{background:linear-gradient(135deg,#FFF8E1,#FFE082);border-radius:var(--r);
  padding:14px 16px;margin-bottom:18px;border:2px solid var(--lemon);
  display:flex;gap:12px;align-items:flex-start}
.weather-ico{font-size:2rem;flex-shrink:0}
.weather-txt h3{font-size:.88rem;font-weight:900;color:#6B4000;margin-bottom:6px}
.weather-txt ul{list-style:none;display:flex;flex-direction:column;gap:3px}
.weather-txt li{font-size:.78rem;color:#5A3500;padding-left:12px;position:relative}
.weather-txt li::before{content:'☀️';position:absolute;left:0;font-size:.6rem;top:2px}

/* ferry box */
.ferry-box{background:linear-gradient(135deg,#E0F2FE,#BAE6FD);border-radius:8px;
  padding:10px 13px;margin-bottom:12px;border-left:3px solid var(--turq)}
.ferry-box h4{font-size:.8rem;font-weight:900;color:#0369A1;margin-bottom:5px}
.ferry-box p{font-size:.78rem;color:#0C4A6E}

/* ── MODALS ── */
.moverlay{position:fixed;inset:0;background:rgba(10,20,40,.72);z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s}
.moverlay.open{opacity:1;pointer-events:all}
.msheet{background:var(--chalk);border-radius:22px 22px 0 0;width:100%;max-width:720px;
  max-height:88vh;overflow-y:auto;padding:22px 18px 36px;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.34,1.2,.64,1)}
.moverlay.open .msheet{transform:translateY(0)}
.mhandle{width:38px;height:4px;background:var(--sand);border-radius:2px;margin:0 auto 18px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mhdr h2{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--dark)}
.mclose{background:var(--sand);border:none;border-radius:50%;width:30px;height:30px;
  font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.mclose:hover{background:#E0CCA0}

/* route modal */
.rseg{margin-bottom:22px}
.rseg h3{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--sea);
  margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--sand)}
.rstep{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;position:relative}
.rstep:not(:last-child)::after{content:'';position:absolute;left:16px;top:36px;bottom:-6px;
  width:2px;background:var(--sand)}
.rbullet{width:32px;height:32px;border-radius:50%;background:var(--sea);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.rbullet.tv{background:#4A5568}
.rbullet.e2{background:var(--terra)}
.rcon strong{display:block;font-size:.88rem;font-weight:700}
.rcon span{font-size:.77rem;color:var(--muted)}

/* todo modal */
.tgroup{margin-bottom:18px}
.tgroup-hdr{font-size:.72rem;font-weight:900;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.titem{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;
  background:#fff;border-radius:8px;margin-bottom:5px;cursor:pointer;
  transition:all .18s;border:2px solid transparent}
.titem:hover{border-color:var(--sand)}
.titem.done{background:#F0FFF4;border-color:#A8E6B8}
.titem input[type=checkbox]{width:17px;height:17px;accent-color:var(--olive);
  cursor:pointer;flex-shrink:0;margin-top:2px}
.titem .tlabel{font-size:.83rem;font-weight:700}
.titem.done .tlabel{text-decoration:line-through;color:var(--muted)}
.titem .tnote{font-size:.72rem;color:var(--muted);margin-top:2px}
.titem.urgent .tlabel::after{content:' ⚠️'}
.todo-prog{background:var(--sand);border-radius:4px;height:5px;margin-bottom:14px;overflow:hidden}
.todo-bar{background:linear-gradient(90deg,var(--olive),var(--turq));
  height:100%;border-radius:4px;transition:width .4s ease}
.todo-stat{font-size:.78rem;color:var(--muted);margin-bottom:6px}

/* Leaflet markers */
.cmarker{border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.68rem;font-weight:800;
  box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .main-lay{grid-template-columns:1fr;grid-template-rows:260px auto}
  .map-panel{position:relative;top:auto;height:260px;order:-1}
  #map{height:260px}
  .content{max-height:none;overflow-y:visible}
  .photos-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .map-panel{height:210px}
  #map{height:210px}
  .main-lay{grid-template-rows:210px auto}
  .avrow{gap:10px}
}
</style>
<body>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
  <div class="s-sun"></div>
  <button id="skip-btn" onclick="endSplash()">Überspringen ✕</button>

  <div class="s-title">
    <h1>Korfu &amp; Ksamil</h1>
    <p>Sommer 2026 · Familie Monschein</p>
  </div>

  <div class="avrow" id="avrow">
    <!-- Michael -->
    <div class="avcard" id="av0">
      <svg viewBox="0 0 90 110" width="78" height="95">
        <path d="M10,72 L5,105 L85,105 L80,72 Q65,80 45,80 Q25,80 10,72Z" fill="#1B6CA8"/>
        <rect x="37" y="62" width="16" height="13" fill="#F2B48A"/>
        <ellipse cx="45" cy="42" rx="28" ry="26" fill="#F2B48A"/>
        <!-- shaved head shadow -->
        <ellipse cx="45" cy="23" rx="28" ry="11" fill="#8B6050" opacity=".5"/>
        <!-- blue wraparound sunglasses -->
        <rect x="18" y="34" width="22" height="12" rx="6" fill="#1A5FA8" opacity=".92"/>
        <rect x="50" y="34" width="22" height="12" rx="6" fill="#1A5FA8" opacity=".92"/>
        <rect x="38" y="38" width="14" height="4" fill="#0D3A6B"/>
        <ellipse cx="29" cy="40" rx="9" ry="5" fill="#2472CC" opacity=".4"/>
        <ellipse cx="61" cy="40" rx="9" ry="5" fill="#2472CC" opacity=".4"/>
        <!-- smile -->
        <path d="M28,54 Q45,64 62,54" stroke="#C47A50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- cheeks -->
        <circle cx="28" cy="53" r="5" fill="#FFB0A0" opacity=".35"/>
        <circle cx="62" cy="53" r="5" fill="#FFB0A0" opacity=".35"/>
      </svg>
      <span class="avname">Michael</span>
    </div>
    <!-- Nina -->
    <div class="avcard" id="av1">
      <svg viewBox="0 0 90 110" width="78" height="95">
        <path d="M12,70 L7,105 L83,105 L78,70 Q64,79 45,79 Q26,79 12,70Z" fill="#E8E4E0"/>
        <rect x="38" y="60" width="14" height="13" fill="#F2B48A"/>
        <ellipse cx="45" cy="41" rx="25" ry="24" fill="#F2B48A"/>
        <!-- dark hair sides -->
        <rect x="18" y="30" width="9" height="46" rx="4" fill="#160808"/>
        <rect x="63" y="30" width="9" height="46" rx="4" fill="#160808"/>
        <!-- hair top -->
        <path d="M20,38 Q22,16 45,15 Q68,16 70,38 Q62,23 45,23 Q28,23 20,38" fill="#160808"/>
        <!-- red square glasses -->
        <rect x="19" y="34" width="20" height="13" rx="3" fill="none" stroke="#CC2222" stroke-width="2.8"/>
        <rect x="51" y="34" width="20" height="13" rx="3" fill="none" stroke="#CC2222" stroke-width="2.8"/>
        <line x1="39" y1="40" x2="51" y2="40" stroke="#CC2222" stroke-width="2.2"/>
        <rect x="19" y="34" width="20" height="13" rx="3" fill="#FFE8E8" opacity=".25"/>
        <rect x="51" y="34" width="20" height="13" rx="3" fill="#FFE8E8" opacity=".25"/>
        <!-- smile -->
        <path d="M30,51 Q45,61 60,51" stroke="#C47A50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="29" cy="50" r="5" fill="#FFB0A0" opacity=".4"/>
        <circle cx="61" cy="50" r="5" fill="#FFB0A0" opacity=".4"/>
      </svg>
      <span class="avname">Nina</span>
    </div>
    <!-- Leah -->
    <div class="avcard" id="av2">
      <svg viewBox="0 0 90 110" width="78" height="95">
        <path d="M13,70 L8,105 L82,105 L77,70 Q63,79 45,79 Q27,79 13,70Z" fill="#7B2D8B"/>
        <rect x="38" y="60" width="14" height="12" fill="#F2B48A"/>
        <ellipse cx="45" cy="41" rx="24" ry="23" fill="#F2B48A"/>
        <!-- long straight hair -->
        <rect x="17" y="25" width="11" height="62" rx="5" fill="#2A1408"/>
        <rect x="62" y="25" width="11" height="62" rx="5" fill="#2A1408"/>
        <!-- hair top -->
        <path d="M20,37 Q21,16 45,15 Q69,16 70,37 Q63,22 45,22 Q27,22 20,37" fill="#2A1408"/>
        <!-- eyes -->
        <ellipse cx="35" cy="39" rx="4" ry="3.5" fill="#2A1000"/>
        <ellipse cx="55" cy="39" rx="4" ry="3.5" fill="#2A1000"/>
        <ellipse cx="36" cy="38" rx="1.5" ry="1" fill="#fff"/>
        <ellipse cx="56" cy="38" rx="1.5" ry="1" fill="#fff"/>
        <!-- smile -->
        <path d="M32,51 Q45,61 58,51" stroke="#C47A50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="31" cy="50" r="5" fill="#FFB0A0" opacity=".35"/>
        <circle cx="59" cy="50" r="5" fill="#FFB0A0" opacity=".35"/>
        <!-- silver watch hint -->
        <rect x="63" y="68" width="7" height="3" rx="1" fill="#C0C0C0" opacity=".7"/>
      </svg>
      <span class="avname">Leah</span>
    </div>
    <!-- Maxi -->
    <div class="avcard" id="av3">
      <svg viewBox="0 0 90 110" width="78" height="95">
        <path d="M11,71 L6,105 L84,105 L79,71 Q65,79 45,79 Q25,79 11,71Z" fill="#2A2A2A"/>
        <rect x="37" y="61" width="16" height="13" fill="#F2B48A"/>
        <circle cx="45" cy="42" r="26" fill="#F2B48A"/>
        <!-- dark curly hair -->
        <path d="M19,40 Q20,15 45,14 Q70,15 71,40 Q65,23 45,23 Q25,23 19,40" fill="#160808"/>
        <circle cx="23" cy="37" r="7" fill="#160808"/>
        <circle cx="67" cy="37" r="7" fill="#160808"/>
        <circle cx="35" cy="17" r="6" fill="#160808"/>
        <circle cx="55" cy="17" r="6" fill="#160808"/>

</div>`;

/* ══════════════════════════════════════
   RENDER FUNCTIONS
══════════════════════════════════════ */
function etColor(et){return{e1:'#1B6CA8',e2:'#C4622D',e3:'#5C7A3E',tv:'#4A5568'}[et]||'#888'}

function renderDay(d){
  let h=`<div class="dcard" id="dc-${d.id}">`;
  // header
  h+=`<div class="dcard-hdr ${d.et}"><div><div class="dtag">${d.id} · ${d.date} · ${d.wd}</div><h2>${d.title}</h2><p>${d.sub}</p></div></div>`;
  h+=`<div class="dbody">`;

  // alerts
  d.alerts.forEach(a=>h+=`<div class="alert-box ${a.t}"><strong>${a.t==='warn'?'⚠️ Wichtig:':'ℹ️ Info:'}</strong>${a.text}</div>`);

  // activities
  if(d.acts.length){
    h+=`<ul class="alist">`;
    d.acts.forEach(a=>h+=`<li class="aitem"><span class="aico">${a.i}</span><div class="atxt"><strong>${a.t}</strong><span>${a.d}</span></div></li>`);
    h+=`</ul>`;
  }

  // photos
  if(d.photos.length){
    h+=`<div class="photos-grid">`;
    d.photos.forEach(p=>{
      const caps={agiosGordios:'Agios Gordios Beach',korfuAerial:'Korfu-Stadt Panorama',alteFestung:'Alte Festung & Altstadt',paleokastritsa:'Paleokastritsa Panorama',paleokastritsa2:'Paleokastritsa Bucht',achilleion:'Achilleion Palast',pontikonisi:'Pontikonisi Mauseinsel',kanoni:'Kanoni Aussicht',oldFortress:'Alte Festung Korfu',ksamil:'Ksamil Beach',ksamilRiviera:'Ksamil Albanian Riviera',butrint:'Butrint UNESCO',blueEye:'Blaues Auge · Syri i Kaltër'};
      h+=imgTag(p,caps[p]||p);
    });
    h+=`</div>`;
  }

  // selfie spots
  if(d.selfie.length){
    h+=`<div class="sbox"><h4>📸 Selfie & Foto-Spots</h4>`;
    d.selfie.forEach(s=>h+=`<div class="sitem">📍 <strong>${s.t}</strong> — ${s.tip}</div>`);
    h+=`</div>`;
  }

  // restaurants
  if(d.rests.length){
    h+=`<div class="slabel">🍴 Restaurants & Cafés</div>`;
    d.rests.forEach(r=>{
      h+=`<div class="rcard"><h4>${r.n}</h4><p>${r.d}</p><div class="rtags">${r.tags.map(t=>`<span class="rtag">${t}</span>`).join('')}</div></div>`;
    });
  }

  // evening
  if(d.eve)h+=`<div class="ebox"><h4>🌆 Abendprogramm</h4><p>${d.eve}</p></div>`;

  // tips
  if(d.tips.length){
    h+=`<div class="tips-box"><h4>💡 Tipps</h4>`;
    d.tips.forEach(t=>h+=`<div class="tip-item">${t}</div>`);
    h+=`</div>`;
  }

  h+=`</div></div>`;
  return h;
}

/* ══════════════════════════════════════
   TAB SETUP
══════════════════════════════════════ */
const ETAPPES=[
  {label:'🔵 Etappe 1 · Korfu Agios Gordios',cls:'e1',ids:['T1','T2','T3','T4','T5','T6','T7','T8']},
  {label:'🔴 Etappe 2 · Ksamil · Albanien',cls:'e2',ids:['T9','T10','T11','T12']},
  {label:'🟢 Etappe 3 · Korfu Ýpsos',cls:'e3',ids:['T13','T14','T15','T16','T17']},
];

function buildTabs(){
  const ti=document.getElementById('tabs-inner');
  const eb=document.getElementById('etag-bar');

  // ALLE
  const all=document.createElement('button');
  all.className='tbtn all active';all.textContent='ALLE';all.dataset.id='ALL';
  all.onclick=()=>switchTab('ALL');ti.appendChild(all);

  ETAPPES.forEach(e=>{
    const el=document.createElement('span');
    el.className=`etag ${e.cls}`;el.textContent=e.label;eb.appendChild(el);
    e.ids.forEach(id=>{
      const d=DAYS.find(x=>x.id===id);
      const b=document.createElement('button');
      b.className=`tbtn ${d.et}`;b.dataset.id=id;
      b.textContent=`${d.wd} ${d.date}`;
      b.onclick=()=>switchTab(id);
      ti.appendChild(b);
    });
  });
}

let activeTab='ALL';
function switchTab(id){
  activeTab=id;
  document.querySelectorAll('.tbtn').forEach(b=>{
    b.classList.toggle('active',b.dataset.id===id);
  });
  renderContent(id);
  updateMap(id);
}

function renderContent(id){
  const ct=document.getElementById('content');
  if(id==='ALL'){
    let h=weatherBox();
    DAYS.forEach(d=>h+=renderDay(d));
    ct.innerHTML=h;
  }else{
    const d=DAYS.find(x=>x.id===id);
    ct.innerHTML=weatherBox()+renderDay(d);
  }
  // animate cards
  requestAnimationFrame(()=>{
    document.querySelectorAll('.dcard').forEach((c,i)=>{
      setTimeout(()=>c.classList.add('vis'),i*60);
    });
  });
  ct.scrollTop=0;
}

function weatherBox(){
  return`<div class="weather-wrap"><div class="weather-ico">☀️</div><div class="weather-txt"><h3>Hitze-Alarm: Ende Juli/Anfang August in Griechenland & Albanien!</h3><ul><li>Temperaturen 32–38°C — Mittagssonne 13–16 Uhr meiden</li><li>LSF 50+ für alle, alle 2h neu auftragen — besonders Leah & Maxi!</li><li>Mind. 2 Liter Wasser pro Person täglich trinken</li><li>Leichte Kleidung, Sonnenhüte, Sonnenbrillen einpacken</li><li>Aktivitäten am besten vor 12 Uhr oder nach 17 Uhr</li></ul></div></div>`;
}

/* ══════════════════════════════════════
   LEAFLET MAP
══════════════════════════════════════ */
let map,layerGroup;

function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
  layerGroup=L.layerGroup().addTo(map);
  L.control.attribution({prefix:'© OpenStreetMap'}).addTo(map);
  updateMap('ALL');
}

function makeIcon(type,label){
  const colors={e1:'#1B6CA8',e2:'#C4622D',e3:'#5C7A3E',tv:'#4A5568',
    hotel:'#5C7A3E',selfie:'#F5C518',ferry:'#00B4B4'};
  const c=colors[type]||'#888';
  const tc=type==='selfie'?'#5A4000':'#fff';
  return L.divIcon({
    html:`<div class="cmarker" style="background:${c};color:${tc};width:28px;height:28px">${label}</div>`,
    className:'',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-14]
  });
}

function addRoute(pts,color){
  if(pts.length<2)return;
  L.polyline(pts,{color,weight:3,opacity:.7,dashArray:'6,4'}).addTo(layerGroup);
}

function updateMap(id){
  if(!map)return;
  layerGroup.clearLayers();

  const allMarkers=[];

  if(id==='ALL'){
    // Draw etappe routes
    const r1=DAYS.filter(d=>d.et==='e1').map(d=>LOCS[d.marks[0]]).filter(Boolean).map(l=>l.ll);
    const r2=DAYS.filter(d=>d.et==='e2').map(d=>LOCS[d.marks[0]]).filter(Boolean).map(l=>l.ll);
    const r3=DAYS.filter(d=>d.et==='e3').map(d=>LOCS[d.marks[0]]).filter(Boolean).map(l=>l.ll);
    addRoute([...new Set(r1.map(JSON.stringify))].map(JSON.parse),'#1B6CA8');
    addRoute([...new Set(r2.map(JSON.stringify))].map(JSON.parse),'#C4622D');
    addRoute([...new Set(r3.map(JSON.stringify))].map(JSON.parse),'#5C7A3E');

    // Ferry route
    addRoute([LOCS.korfuPort.ll,LOCS.saranda.ll],'#00B4B4');

    // All locations
    Object.entries(LOCS).forEach(([k,loc])=>{
      const lbl=loc.type==='selfie'?'📸':loc.type==='hotel'?'🏨':loc.type==='ferry'?'⛴':'●';
      const m=L.marker(loc.ll,{icon:makeIcon(loc.type,lbl)})
        .addTo(layerGroup).bindPopup(`<div class="popup-content"><strong>${loc.name}</strong></div>`);
      allMarkers.push(loc.ll);
    });
    map.fitBounds([[39.45,19.60],[39.95,20.40]],{padding:[20,20]});
  }else{
    const d=DAYS.find(x=>x.id===id);
    const pts=d.marks.map(k=>LOCS[k]).filter(Boolean);
    const lls=pts.map(l=>l.ll);
    if(lls.length>1)addRoute(lls,etColor(d.et));
    pts.forEach((loc,i)=>{
      const lbl=loc.type==='selfie'?'📸':loc.type==='hotel'?'🏨':loc.type==='ferry'?'⛴':`${i+1}`;
      L.marker(loc.ll,{icon:makeIcon(loc.type,lbl)})
        .addTo(layerGroup)
        .bindPopup(`<div class="popup-content"><strong>${loc.name}</strong><br><span>${d.title}</span></div>`)
        .openPopup();
      allMarkers.push(loc.ll);
    });
    if(allMarkers.length===1){
      map.setView(allMarkers[0],d.center[2]||13);
    }else if(allMarkers.length>1){
      map.fitBounds(allMarkers,{padding:[40,40]});
    }else{
      map.setView([d.center[0],d.center[1]],d.center[2]||12);
    }
  }
}

/* ══════════════════════════════════════
   MODALS
══════════════════════════════════════ */
function openModal(id){
  if(id==='route'){
    document.getElementById('route-content').innerHTML=ROUTE_HTML;
  }else if(id==='todo'){
    renderTodo();
  }
  document.getElementById('modal-'+id).classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(id){
  document.getElementById('modal-'+id).classList.remove('open');
  document.body.style.overflow='';
}
// Close on overlay click
document.querySelectorAll('.moverlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id.replace('modal-',''))});
});

/* ══════════════════════════════════════
   TODO + LOCALSTORAGE
══════════════════════════════════════ */
function getTodoState(){
  try{return JSON.parse(localStorage.getItem('korfu26_todo')||'{}')}catch{return{}}
}
function saveTodoState(s){
  localStorage.setItem('korfu26_todo',JSON.stringify(s));
}

function renderTodo(){
  const state=getTodoState();
  const allIds=TODOS.flatMap(g=>g.items.map(i=>i.id));
  const done=allIds.filter(id=>state[id]).length;
  const pct=Math.round(done/allIds.length*100);

  document.getElementById('todo-stat').textContent=`${done} von ${allIds.length} erledigt`;
  document.getElementById('todo-bar').style.width=pct+'%';

  let h='';
  TODOS.forEach(g=>{
    h+=`<div class="tgroup"><div class="tgroup-hdr">${g.g}</div>`;
    g.items.forEach(item=>{
      const chk=!!state[item.id];
      h+=`<div class="titem${chk?' done':''}${item.urgent?' urgent':''}" onclick="toggleTodo('${item.id}')">
        <input type="checkbox" id="cb_${item.id}" ${chk?'checked':''} onclick="event.stopPropagation()">
        <div><div class="tlabel">${item.label}</div>${item.note?`<div class="tnote">${item.note}</div>`:''}
        </div></div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('todo-content').innerHTML=h;
}

function toggleTodo(id){
  const s=getTodoState();
  s[id]=!s[id];
  saveTodoState(s);
  renderTodo();
}

/* ══════════════════════════════════════
   SPLASH SEQUENCE
══════════════════════════════════════ */
function endSplash(){
  document.getElementById('splash').classList.add('out');
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    const app=document.getElementById('app');
    app.classList.add('vis');
    initMap();
    buildTabs();
    renderContent('ALL');
  },800);
}

(function initSplash(){
  const delays=[0,700,1400,2100];
  delays.forEach((d,i)=>{
    setTimeout(()=>{
      const el=document.getElementById('av'+i);
      if(el)el.classList.add('show');
    },d+400);
  });
  // Auto-advance after 10s
  setTimeout(endSplash,10000);
})();
